name: Build and publish Docker images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api
            dockerfile: server/Dockerfile.api
          - service: admin
            dockerfile: server/Dockerfile.admin
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/elektrika1-${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/elektrika1-${{ matrix.service }}:${{ github.sha }}
